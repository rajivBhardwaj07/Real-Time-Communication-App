services:
  - type: web
    name: rtc-app
    runtime: node
    plan: free
    region: oregon
    buildCommand: npm install --omit=dev
    startCommand: node server.js
    healthCheckPath: /
    envVars:
      - key: NODE_VERSION
        value: "20"
      - key: NODE_ENV
        value: production
      - key: JWT_SECRET
        generateValue: true
